<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Test Results</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
        }
        .test-frame {
            width: 100%;
            height: 600px;
            border: 2px solid #333;
            margin: 20px 0;
        }
        .test-section {
            margin: 30px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        h2 {
            color: #333;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>AgriNext Page Testing</h1>
    
    <div class="test-section">
        <h2>Test 1: Home Page (http://localhost:5174/)</h2>
        <div id="test1-status" class="status">Loading...</div>
        <iframe id="frame1" class="test-frame" src="http://localhost:5174/"></iframe>
    </div>

    <div class="test-section">
        <h2>Test 2: Login Page (http://localhost:5174/login)</h2>
        <div id="test2-status" class="status">Loading...</div>
        <iframe id="frame2" class="test-frame" src="http://localhost:5174/login"></iframe>
    </div>

    <script>
        function checkFrame(frameId, statusId, pageName) {
            const frame = document.getElementById(frameId);
            const status = document.getElementById(statusId);
            
            frame.onload = function() {
                try {
                    const frameDoc = frame.contentDocument || frame.contentWindow.document;
                    const hasContent = frameDoc.body && frameDoc.body.innerHTML.trim().length > 0;
                    const hasError = frameDoc.body.innerHTML.includes('error') || 
                                   frameDoc.body.innerHTML.includes('Error') ||
                                   frameDoc.body.innerHTML.includes('Something went wrong');
                    
                    if (hasContent && !hasError) {
                        status.className = 'status success';
                        status.innerHTML = `✓ ${pageName} loaded successfully`;
                    } else if (hasError) {
                        status.className = 'status error';
                        status.innerHTML = `✗ ${pageName} has errors visible`;
                    } else {
                        status.className = 'status error';
                        status.innerHTML = `✗ ${pageName} appears blank`;
                    }
                } catch (e) {
                    status.className = 'status error';
                    status.innerHTML = `⚠ Cannot access ${pageName} content (CORS restriction). Check browser console.`;
                }
            };
            
            frame.onerror = function() {
                status.className = 'status error';
                status.innerHTML = `✗ ${pageName} failed to load`;
            };
        }

        checkFrame('frame1', 'test1-status', 'Home page');
        checkFrame('frame2', 'test2-status', 'Login page');
    </script>
</body>
</html>
